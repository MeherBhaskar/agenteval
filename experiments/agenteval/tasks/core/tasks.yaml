task_id: web_shopping_01_product_finding
category: web_shopping
version: "1.0"
description: |
  Find and purchase a product on a simulated e-commerce site given a natural language query.
  Requires search, filtering, comparison, and checkout navigation.

environment:
  image: "agenteval/web-shopping:v1.0"
  cpu: "2"
  memory: "4g"
  timeout: 300
  network: true

interface:
  observation_space:
    type: "dict"
    fields:
      query: "string"
      page_html: "string"
      url: "string"
      cart: "list[dict]"
  action_space:
    type: "dict"
    fields:
      action_type: "string"  # "click", "type", "scroll", "search", "buy"
      selector: "string"
      value: "string"

splits:
  train: 2000
  dev: 500
  test: 3000
  challenge: 500

metrics:
  - "purchase_success"
  - "query_relevance"
  - "price_optimality"
  - "steps_to_purchase"
  - "total_cost_usd"

metadata:
  domain: "e_commerce"
  difficulty: "hard"
  tags: ["web_navigation", "shopping", "multi_step"]

---
task_id: travel_planning_01_multi_constraint
category: travel_planning
version: "1.0"
description: |
  Plan a trip satisfying multiple constraints: budget, dates, preferences, group size.
  Requires flight/hotel search, itinerary optimization, trade-off reasoning.

environment:
  image: "agenteval/travel-planning:v1.0"
  cpu: "4"
  memory: "8g"
  timeout: 600
  network: true

interface:
  observation_space:
    type: "dict"
    fields:
      user_request: "string"
      constraints: "dict"
      search_results: "list[dict]"
      current_itinerary: "dict"
  action_space:
    type: "dict"
    fields:
      action: "string"  # "search_flights", "search_hotels", "add_activity", "finalize"
      parameters: "dict"

splits:
  train: 500
  dev: 200
  test: 1000
  challenge: 200

metrics:
  - "constraint_satisfaction"
  - "total_cost_vs_budget"
  - "preference_alignment"
  - "itinerary_quality"
  - "planning_time"

metadata:
  domain: "travel"
  difficulty: "hard"
  tags: ["multi_constraint", "optimization", "planning"]