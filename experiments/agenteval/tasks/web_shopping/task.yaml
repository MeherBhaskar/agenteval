category: web_shopping
description: Find and purchase a product on a simulated e-commerce site given a natural
  language query. Requires search, filtering, comparison, and checkout navigation.
environment:
  cpu: '2'
  image: agenteval/web-shopping:v1.0
  memory: 4g
  network: true
  timeout: 300
interface:
  action_space:
    fields:
      action_type: string
      selector: string
      value: string
    type: dict
  observation_space:
    fields:
      cart: list[dict]
      page_html: string
      query: string
      url: string
    type: dict
metadata:
  difficulty: hard
  domain: e_commerce
  tags:
  - web_navigation
  - shopping
  - multi_step
metrics:
- purchase_success
- query_relevance
- price_optimality
- steps_to_purchase
- total_cost_usd
splits:
  challenge: 500
  dev: 500
  test: 3000
  train: 2000
task_id: web_shopping_01_product_finding
version: '1.0'

